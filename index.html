<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Your page description here" />
    <title>Luis Lopez Photos</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <img class="logo" src="images/logo-mark.svg" alt="Luis Lopez Photography Logo">
        <div class="header-right">
          <nav aria-label="primary">
            <ul>
              <li><a href="portfolio/index.html">PORTFOLIO</a></li>
              <li><a href="services/index.html">SERVICES</a></li>
              <li><a href="about/index.html">ABOUT</a></li>
            </ul>
          </nav>
          <a href="#contact" class="header-cta">CONTACT</a>
        </div>
      </div>
    </header>
    <main>
      <section class="hero">
        <div class="container">
          <div class="hero-text">
            <h1>LUIS<br>LOPE<span class="kern-z">Z</span></h1>
            <p>PROFESSIONAL PORTRAIT &amp; PRODUCT PHOTOGRAPHY</p>
          </div>
          <div class="hero-images">
            <img src="images/1.jpg" alt="Hero Image 1" class="hero-image hero-image1">
            <img src="images/2.jpg" alt="Hero Image 2" class="hero-image hero-image2">
            <img src="images/3.jpg" alt="Hero Image 3" class="hero-image hero-image3">
            <img src="images/profile.jpeg" alt="Hero Image 4" class="hero-image hero-image4">
          </div>
        </div>
      </section>
      <section class="portfolio" id="portfolio">
        <div class="container">
          <h2>PORTFOLIO</h2>
        </div>
          <div class="portfolio-gallery">
            <div class="portfolio-portrait-gallery">
              <img src="images/1.jpg" alt="Portrait 1">
              <img src="images/2.jpg" alt="Portrait 2"> 
              <img src="images/3.jpg" alt="Portrait 3">
              <img src="images/1.jpg" alt="Portrait 1">
              <img src="images/2.jpg" alt="Portrait 2"> 
              <img src="images/3.jpg" alt="Portrait 3">
            </div>
            <div class="portfolio-product-gallery">
              <img src="images/1.jpg" alt="Product 1">
              <img src="images/2.jpg" alt="Product 2">
              <img src="images/3.jpg" alt="Product 3">
              <img src="images/1.jpg" alt="Product 1">
              <img src="images/2.jpg" alt="Product 2">
              <img src="images/3.jpg" alt="Product 3">
            </div>
          </div>
      </section>
      <section class="services" id="services">
        <div class="container">
          <h2>SERVICES</h2>
          <div class="cards">
            <div class="card">
              <img class="card-image" src="images/1.jpg" alt="Portrait Image">
              <h3 class="card-title">PORTRAITS</h3>
            </div>
            <div class="card">
              <img class="card-image" src="images/3.jpg" alt="Product Image">
              <h3 class="card-title">PRODUCTS</h3>
            </div>
          </div>
        </div>
      </section>
      <section class="contact" id="contact">
        <div class="container">
          <h2>CONTACT</h2>
          <a href="mailto:hello@luislopezphoto.com">hello@luislopezphoto.com</a> 
          <p>(203) 414-6084</p>
          <form></form>
        </div>
      </section>
    </main>
    <footer>
      <div class="container">
        <div class="watermark">
          <p>LUIS<br>LOPE<span class="kern-z">Z</span></p>
        </div>
        <nav aria-label="footer">
          <ul>
            <li>LINK 1</li>
            <li>LINK 2</li>
            <li>LINK 3</li>
          </ul>
        </nav>
      </div>
    </footer>
    <script src="js/main.js"></script>
  </body>
</html>
