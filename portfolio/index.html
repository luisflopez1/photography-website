    <div class="albums">
    <div class="portfolio-header">
      <h2><span id="portraits-label" class="album-highlight">PORTRAITS</span> <span id="slash"> \ </span> <span id="product-label" class="album-dehighlight">PRODUCT</span></h2>
      <h4>01/05</h4>

  	<div class="album">
  	  <div class="page-edge2"></div>

  	<section class="contact" id="contact">
        <div class="container">
          <h2>CONTACT</h2>
          <a href="mailto:hello@luislopezphoto.com">LUIS.LOPEZ0417@GMAIL.COM</a>
          <p>&nbsp;· &nbsp;(203) 414-6084</p>
          <form
            action='https://formspree.io/f/xqeydalv'
            method='POST'
            class="contact-form"
            >
              <input type="text" name="_gotcha" style="display:none"> <!-- honeypot -->
              <div class="form-row">
              <input type="text" name="name" placeholder="NAME" required>
              <input type="email" name="email" placeholder="EMAIL" required>
              </div>
              <textarea name="message" placeholder="MESSAGE" rows="4" required></textarea>
              <div class="form-submit">
              <button type="submit">SEND</button>
              </div>
            
          </form>
        </div>
      </section>
